name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            fauxtoe/booking-site:latest
            fauxtoe/booking-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-koyeb:
    name: Deploy to Koyeb
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Koyeb CLI
        run: |
          latest=$(curl -fsSL https://api.github.com/repos/koyeb/koyeb-cli/releases/latest | jq -r '.tag_name')
          curl -fsSL -o koyeb.tar.gz "https://github.com/koyeb/koyeb-cli/releases/download/${latest}/koyeb-cli_${latest#v}_linux_amd64.tar.gz"
          tar xzf koyeb.tar.gz
          sudo mv koyeb /usr/local/bin/koyeb
          koyeb version

      - name: Deploy archive to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: |
          koyeb deploy . booking-site-mar17/booking-site --archive-builder docker
