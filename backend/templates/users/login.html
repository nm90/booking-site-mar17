{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p>Sign in to manage your booking</p>
        </div>

        <form action="{{ url_for('auth.do_login') }}" method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email"
                       value="{{ email or '' }}"
                       placeholder="you@example.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Log In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
        </div>

        <div class="auth-demo">
            <p class="demo-title">Demo accounts</p>
            <div class="demo-accounts">
                <div class="demo-account">
                    <strong>Admin</strong>
                    <code>admin@vacationrental.com</code>
                    <code>admin123</code>
                </div>
                <div class="demo-account">
                    <strong>Customer</strong>
                    <code>alice@example.com</code>
                    <code>pass123</code>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
