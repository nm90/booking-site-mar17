{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create your account</h1>
            <p>Book your dream vacation at Sunset Villa</p>
        </div>

        <form action="{{ url_for('auth.do_register') }}" method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">First name</label>
                    <input type="text" id="first_name" name="first_name"
                           value="{{ first_name or '' }}" required>
                </div>
                <div class="form-group">
                    <label for="last_name">Last name</label>
                    <input type="text" id="last_name" name="last_name"
                           value="{{ last_name or '' }}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email"
                       value="{{ email or '' }}"
                       placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone_number">Phone number <span class="optional">(optional)</span></label>
                <input type="tel" id="phone_number" name="phone_number"
                       value="{{ phone_number or '' }}"
                       placeholder="555-0100">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="At least 6 characters" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
