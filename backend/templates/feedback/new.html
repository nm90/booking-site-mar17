{% extends "base.html" %}
{% block title %}Leave a Review{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Leave a Review</h1>
        <p class="subtitle">Share your experience for Booking #{{ booking.id }}</p>
    </div>
    <a href="{{ url_for('portal.bookings_show', booking_id=booking.id) }}" class="btn btn-outline">← Back to Booking</a>
</div>

<div class="form-page form-page-narrow">
    <div class="form-card">
        <form action="{{ url_for('portal.reviews_create') }}" method="POST">
            <input type="hidden" name="booking_id" value="{{ booking.id }}">

            <div class="form-group">
                <label>Overall Rating</label>
                <div class="star-rating">
                    {% for i in range(5, 0, -1) %}
                    <input type="radio" id="star{{ i }}" name="rating" value="{{ i }}"
                           {% if (rating | int if rating else 5) == i %}checked{% endif %}>
                    <label for="star{{ i }}" title="{{ i }} star{{ 's' if i > 1 else '' }}">★</label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label for="title">Review title <span class="optional">(optional)</span></label>
                <input type="text" id="title" name="title"
                       value="{{ title or '' }}"
                       placeholder="Summarize your stay in a few words…">
            </div>

            <div class="form-group">
                <label for="content">Your review</label>
                <textarea id="content" name="content" rows="5" required
                          placeholder="Tell us about your experience — the property, the stay, what you loved…">{{ content or '' }}</textarea>
                <p class="form-hint">Minimum 10 characters</p>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('portal.bookings_show', booking_id=booking.id) }}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Review</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
