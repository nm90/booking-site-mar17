<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; line-height: 1.6; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
        .header { text-align: center; padding: 1.5rem 0; border-bottom: 2px solid #2563eb; margin-bottom: 1.5rem; }
        .header h1 { color: #2563eb; font-size: 1.4rem; margin: 0; }
        .content { padding: 1rem 0; }
        .detail-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
        .detail-row { display: flex; justify-content: space-between; padding: 0.3rem 0; }
        .detail-label { color: #64748b; font-size: 0.9rem; }
        .detail-value { font-weight: 600; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; }
        .badge-approved { background: #dcfce7; color: #14532d; }
        .badge-rejected { background: #fee2e2; color: #7f1d1d; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .btn { display: inline-block; padding: 0.7rem 1.5rem; background: #2563eb; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; }
        .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; font-size: 0.85rem; color: #64748b; text-align: center; }
        .checkin-box { background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 1rem; margin: 1rem 0; white-space: pre-line; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Caye Garden Casita</h1>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>Caye Garden Casita &mdash; Belize</p>
            <p>If you have questions, reply to this email or contact us directly.</p>
        </div>
    </div>
</body>
</html>
