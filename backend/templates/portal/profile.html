{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>My Profile</h1>
        <p class="subtitle">View and update your account details</p>
    </div>
</div>

<div class="form-page">
    <div class="form-card">
        <form action="{{ url_for('portal.profile_update') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">First name</label>
                    <input
                        type="text"
                        id="first_name"
                        name="first_name"
                        value="{{ form_data.get('first_name', '') }}"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="last_name">Last name</label>
                    <input
                        type="text"
                        id="last_name"
                        name="last_name"
                        value="{{ form_data.get('last_name', '') }}"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ form_data.get('email', '') }}"
                    placeholder="you@example.com"
                    required
                >
            </div>

            <div class="form-actions">
                <a href="{{ url_for('portal.dashboard') }}" class="btn btn-outline">Back to Dashboard</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
