services:
  - name: booking-site
    image: fauxtoe/booking-site
    env:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_PATH
        value: /tmp/booking_site.db
      - key: SECRET_KEY
        secret: secret-key
    ports:
      - name: http
        port: 5000
    health_checks:
      - type: http
        path: /health
