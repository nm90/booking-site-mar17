services:
  - name: booking-site
    image: fauxtoe/booking-site
    env:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_PATH
        value: /tmp/booking_site.db
      - key: SECRET_KEY
        secret: secret-key
      - key: BREVO_API_KEY
        secret: brevo-api-key
      - key: LANDING_SITE_URL
        value: https://nm90.github.io/booking-site-mar17/
    ports:
      - name: http
        port: 5000
    health_checks:
      - type: http
        path: /health
